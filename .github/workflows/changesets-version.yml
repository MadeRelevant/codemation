name: Changesets

# Opens or updates the "Version Packages" PR when changesets land on main, then tags and dispatches publish-npm.yml.
# Pushes tags with GITHUB_TOKEN do not trigger other workflows, so we `gh workflow run publish-npm.yml` (not
# `workflow_call`) so npm OIDC trusted publishing still matches publish-npm.yml.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Used by @changesets/changelog-github (get-github-info) when resolving PRs/commits.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Version Packages PR
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          # `changesets/action@v1` treats `branch` as the PR base and creates `changeset-release/<branch>` automatically.
          branch: main

  tag-release:
    name: Tag merged release
    needs: version
    # Direct commits from changesets use "chore: version packages". Merge commits use
    # "Merge pull request #… from …/changeset-release/main" — still a version bump.
    if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && (startsWith(github.event.head_commit.message, 'chore: version packages') || contains(github.event.head_commit.message, 'changeset-release/main')) }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.publish-release-tag.outputs.tag_name }}
      tag_created: ${{ steps.publish-release-tag.outputs.tag_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve release tag version
        run: node tooling/release/resolve-release-tag-version.mjs --root . --output "${RUNNER_TEMP}/release-tag-version.txt"

      - name: Create and push release tag
        id: publish-release-tag
        env:
          RELEASE_TAG_VERSION_FILE: ${{ runner.temp }}/release-tag-version.txt
        run: |
          set -euo pipefail
          tag_name="v$(tr -d '\n' < "${RELEASE_TAG_VERSION_FILE}")"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists; skipping publish."
            echo "tag_created=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git tag "${tag_name}" "${GITHUB_SHA}"
          git push origin "${tag_name}"
          echo "tag_created=true" >> "${GITHUB_OUTPUT}"

  publish-release:
    name: Dispatch publish npm
    needs: tag-release
    if: ${{ needs.tag-release.result == 'success' && needs.tag-release.outputs.tag_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write # gh workflow run publish-npm.yml
      contents: read
    steps:
      - name: Run Publish npm workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag-release.outputs.tag }}
        run: gh workflow run publish-npm.yml --repo "${{ github.repository }}" -f "tag=${TAG}" --ref "${{ github.event.repository.default_branch || 'main' }}"
