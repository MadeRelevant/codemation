name: Publish npm

# After the Version Packages PR merges, tag a release (e.g. v0.0.18) to publish. Changesets open that PR via changesets-version.yml.
on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC
  contents: write # GitHub Release from @codemation/core CHANGELOG section

jobs:
  # Template smokes (packaged + interactive Verdaccio) run on main via CI; release only publishes.
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Trusted publishing (OIDC): each published package needs:
      # - GitHub Actions trusted publisher on npmjs.com (Package → Settings → Trusted publishing): repo
      #   MadeRelevant/codemation, workflow file publish-npm.yml (name must match exactly).
      # - package.json "repository.url" must match provenance (canonical):
      #   https://github.com/MadeRelevant/codemation (not git+https / .git variants).
      # 404 / ENEEDAUTH from the registry often means OIDC trust mismatch, not a missing tarball.
      # Requires npm CLI ≥ 11.5.1 (Node 24 images satisfy this).
      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks --filter "./packages/*"

      - name: Create GitHub Release (notes from @codemation/core CHANGELOG)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="$VERSION" '
            /^## [0-9]/ {
              if (found) exit
              if ($2 == ver) { found=1; next }
              next
            }
            found { print }
          ' packages/core/CHANGELOG.md > "$NOTES_FILE" || true
          if [ ! -s "$NOTES_FILE" ]; then
            {
              echo "Release **${TAG}** (anchor: \`@codemation/core@${VERSION}\`)."
              echo
              echo "Full history: [packages/core/CHANGELOG.md](https://github.com/MadeRelevant/codemation/blob/${GITHUB_SHA}/packages/core/CHANGELOG.md)"
            } > "$NOTES_FILE"
          fi
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --notes-file "$NOTES_FILE"
          fi
