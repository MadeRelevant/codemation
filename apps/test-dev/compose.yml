services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: codemation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codemation"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - codemation-test-dev-postgres:/var/lib/postgresql/data

volumes:
  codemation-test-dev-postgres:
