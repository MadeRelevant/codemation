  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>
  <text x="90" y="110" fill="white" font-family="Arial, sans-serif" font-size="42" font-weight="700">Production setup: shared database, queue, web process, worker process</text>
  <text x="90" y="152" fill="#94A3B8" font-family="Arial, sans-serif" font-size="24">Same workflow code, more durable infrastructure and clearer separation of concerns</text>

  <rect x="90" y="220" width="280" height="170" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="126" y="278" fill="white" font-family="Arial, sans-serif" font-size="34" font-weight="700">Your app</text>
  <text x="126" y="322" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">codemation.config.ts</text>
  <text x="126" y="356" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">src/workflows/**/*.ts</text>

  <rect x="450" y="160" width="370" height="200" rx="28" fill="#0B1220" stroke="#38BDF8" stroke-width="3"/>
  <text x="490" y="220" fill="white" font-family="Arial, sans-serif" font-size="34" font-weight="700">Web process</text>
  <text x="490" y="266" fill="#BAE6FD" font-family="Arial, sans-serif" font-size="24">codemation serve web</text>
  <text x="490" y="304" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="23">Next host UI</text>
  <text x="490" y="338" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="23">API + auth + workflow control</text>

  <rect x="450" y="460" width="370" height="200" rx="28" fill="#0B1220" stroke="#22C55E" stroke-width="3"/>
  <text x="490" y="520" fill="white" font-family="Arial, sans-serif" font-size="34" font-weight="700">Worker process</text>
  <text x="490" y="566" fill="#BBF7D0" font-family="Arial, sans-serif" font-size="24">codemation serve worker</text>
  <text x="490" y="604" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="23">Consumes BullMQ jobs</text>
  <text x="490" y="638" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="23">Runs offloaded workflow work</text>

  <rect x="960" y="180" width="520" height="190" rx="28" fill="#0B1220" stroke="#475569" stroke-width="2"/>
