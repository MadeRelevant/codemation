name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

# One run per PR (by number) or per ref; new pushes cancel superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Skip full CI on Changesets "Version packages" PRs (release/*, legacy changeset-release/*).
  # The PR-only `merge-gate` job is the single ruleset-required check; see CONTRIBUTING.md.
  static:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # prisma.config.ts requires DATABASE_URL; `prisma generate` does not need a live server.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: "format:check"
          - name: Lint ESLint
            command: "lint:eslint"
          - name: Lint repo
            command: "lint:repo"
          - name: Typecheck
            command: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Generate Prisma client (@codemation/host)
        if: ${{ matrix.name != 'Format' }}
        run: pnpm --filter @codemation/host prisma:generate

      - name: Run ${{ matrix.name }}
        run: pnpm ${{ matrix.command }}

  template-release-smoke:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # prisma.config.ts requires DATABASE_URL; `prisma generate` does not need a live server.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template packaged smoke
            command: test:packaged-smoke
    container:
      image: node:24-bookworm

    steps:
      # TEMPORARILY DISABLED: the scaffolded smoke resolves tsx fresh against the
      # template `^4.21.0` range and picks up 4.22.x, whose `?tsx-namespace=` query
      # propagation to node:* builtins breaks the packaged dev runtime. Re-enable
      # after pinning templates to a known-good tsx (or an upstream tsx fix).
      - name: Run ${{ matrix.name }} (temporarily disabled)
        run: echo "Template packaged smoke temporarily disabled — see ci.yml note (tsx 4.22.x scaffold namespace bug)."

  workspace-host-docker-build:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Build workspace-host Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace-host image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/workspace-host/Dockerfile
          push: false
          tags: workspace-host:pr
          cache-from: type=gha,scope=workspace-host-pr
          cache-to: type=gha,mode=max,scope=workspace-host-pr

  # --- Path-filter gate: compute force_full once and share via outputs ---
  # force_full=true when pushing to main/master or when tooling/workflow/lock files change.
  # When force_full=true, all coverage jobs run regardless of which packages changed.
  path-filter:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Compute path filters
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      force_full: ${{ steps.force.outputs.force_full }}
      core: ${{ steps.filter.outputs.core }}
      core_nodes: ${{ steps.filter.outputs.core_nodes }}
      host: ${{ steps.filter.outputs.host }}
      next_host: ${{ steps.filter.outputs.next_host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine force_full
        id: force
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "force_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute package-level filters
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            core:
              - 'packages/core/**'
              - 'tooling/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
            core_nodes:
              - 'packages/core-nodes/**'
              - 'packages/core-nodes-gmail/**'
              - 'packages/core-nodes-msgraph/**'
              - 'packages/agent-skills/**'
              - 'packages/cli/**'
              - 'packages/create-codemation/**'
              - 'packages/eventbus-redis/**'
            host:
              - 'packages/host/**'
              - 'packages/core/**'
              - 'tooling/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
            next_host:
              - 'packages/next-host/**'
              - 'packages/host/**'
              - 'packages/core/**'
              - 'tooling/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

  # --- Coverage: one job per suite (parallel runners); merge + Codecov in coverage-report ---
  # coverage-unit always runs (no path filter) — cheap, broad coverage of pure logic.
  coverage-unit:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — unit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build 2>&1 | tee build-output.log

      - name: Guard against Turbopack module-tracer regressions
        # Fails the build when Next.js's tracer warns that a dynamic require or filesystem
        # operation pulled the whole repo into the trace. This catches the family of cold-start
        # regressions we have repeatedly hit (e.g. googleapis, @libsql/client eagerly imported
        # at module top in server code). Fix: convert to `await import(...)` inside the function
        # that actually uses the dependency.
        run: |
          if grep -qE "Encountered unexpected file in NFT list|whole project was traced unintentionally" build-output.log; then
            echo "::error::Turbopack module tracer flagged over-tracing — a heavy server-side dependency is likely being eagerly imported. Defer the offending import via `await import(...)`. Recent examples: GoogleGmailSessionFactory (googleapis) and PrismaMigrationDeployer (@libsql/client)."
            grep -nA 25 "Encountered unexpected file in NFT list" build-output.log || true
            exit 1
          fi

      - name: Coverage (unit)
        run: pnpm run coverage:unit

      - name: Upload lcov (unit)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-unit
          path: coverage/raw/unit/lcov.info
          if-no-files-found: error

  coverage-integration:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [path-filter]
    # Run when forced-full OR when host/core packages changed
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check if job should run
        id: should_run
        shell: bash
        run: |
          if [[ "${{ needs.path-filter.outputs.force_full }}" == "true" || "${{ needs.path-filter.outputs.host }}" == "true" || "${{ needs.path-filter.outputs.core }}" == "true" || "${{ needs.path-filter.outputs.core_nodes }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        if: steps.should_run.outputs.run == 'true'

      - name: Generate Prisma client (@codemation/host)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        if: steps.should_run.outputs.run == 'true'
        run: pnpm exec turbo run build

      - name: Coverage (integration)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm run coverage:integration

      - name: Upload lcov (integration)
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-integration
          path: coverage/raw/integration/lcov.info
          if-no-files-found: error

  coverage-integration-sqlite:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — integration (sqlite)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [path-filter]
    env:
      CODEMATION_DATABASE_KIND: sqlite
      DATABASE_URL: file:/tmp/codemation-integration.sqlite
    steps:
      - name: Check if job should run
        id: should_run
        shell: bash
        run: |
          if [[ "${{ needs.path-filter.outputs.force_full }}" == "true" || "${{ needs.path-filter.outputs.host }}" == "true" || "${{ needs.path-filter.outputs.core }}" == "true" || "${{ needs.path-filter.outputs.core_nodes }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        if: steps.should_run.outputs.run == 'true'

      - name: Generate Prisma client (@codemation/host)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        if: steps.should_run.outputs.run == 'true'
        run: pnpm exec turbo run build

      - name: Coverage (integration, sqlite)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm run coverage:integration

      - name: Upload lcov (integration, sqlite)
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-integration-sqlite
          path: coverage/raw/integration/lcov.info
          if-no-files-found: error

  coverage-ui:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — UI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [path-filter]
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Check if job should run
        id: should_run
        shell: bash
        run: |
          if [[ "${{ needs.path-filter.outputs.force_full }}" == "true" || "${{ needs.path-filter.outputs.next_host }}" == "true" || "${{ needs.path-filter.outputs.host }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        if: steps.should_run.outputs.run == 'true'

      - name: Generate Prisma client (@codemation/host)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        if: steps.should_run.outputs.run == 'true'
        run: pnpm exec turbo run build

      - name: Coverage (UI)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm run coverage:ui

      - name: Upload lcov (ui)
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-ui
          path: coverage/raw/ui/lcov.info
          if-no-files-found: error

  coverage-browser:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — browser
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [path-filter]
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check if job should run
        id: should_run
        shell: bash
        run: |
          if [[ "${{ needs.path-filter.outputs.force_full }}" == "true" || "${{ needs.path-filter.outputs.next_host }}" == "true" || "${{ needs.path-filter.outputs.host }}" == "true" || "${{ needs.path-filter.outputs.core }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        if: steps.should_run.outputs.run == 'true'

      - name: Generate Prisma client (@codemation/host)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm --filter @codemation/host prisma:generate

      # Restore-only: pairs with the explicit save step below. The default
      # actions/cache action skips its post-job save whenever a later step fails,
      # so when the install hangs the browser never gets cached and every run
      # re-downloads from the (flaky) CDN. Splitting restore/save lets us persist
      # the browser the instant a download succeeds, independent of test outcome.
      - name: Restore Playwright browser cache
        id: playwright-cache
        if: steps.should_run.outputs.run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright (Chromium)
        if: steps.should_run.outputs.run == 'true'
        timeout-minutes: 30
        # cdn.playwright.dev is flaky in two ways: it sometimes throttles, and it
        # sometimes delivers the zip to 100% but never finalizes the stream (the
        # download bar hits 100% then the process hangs indefinitely). A healthy
        # install completes in ~90s, so fail-fast each attempt at 300s and retry —
        # a hung attempt dies quickly and a fresh connection usually finalizes
        # cleanly. On a cache hit `playwright install` finds the browser present and
        # returns in seconds.
        run: |
          install_pw() { pnpm --filter @codemation/host exec playwright install chromium --with-deps; }
          ok=0
          for attempt in 1 2 3 4 5; do
            if timeout 300 bash -c "$(declare -f install_pw); install_pw"; then ok=1; break; fi
            echo "Playwright install attempt ${attempt} stalled/failed — retrying"
          done
          [ "${ok}" = 1 ]

      # Save immediately after a successful install (not in a post-job hook), so the
      # browser is cached even if a later step fails — this is what finally breaks the
      # re-download-every-run cycle once any run gets a clean download.
      - name: Save Playwright browser cache
        if: steps.should_run.outputs.run == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build
        if: steps.should_run.outputs.run == 'true'
        run: pnpm exec turbo run build

      - name: Coverage (browser)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm run coverage:browser

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-artifacts
          path: |
            packages/host/test-results
            packages/host/test/playwright/.e2e-prepared.json
            coverage/raw/browser/monocart-report.html
            coverage/raw/browser/monocart-report.json
            coverage/raw/browser-scaffolded/monocart-report.html
            coverage/raw/browser-scaffolded/monocart-report.json
          if-no-files-found: warn

      - name: Upload lcov (browser)
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-browser
          path: coverage/raw/browser/lcov.info
          if-no-files-found: error

  coverage-e2e:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [path-filter]
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check if job should run
        id: should_run
        shell: bash
        run: |
          if [[ "${{ needs.path-filter.outputs.force_full }}" == "true" || "${{ needs.path-filter.outputs.host }}" == "true" || "${{ needs.path-filter.outputs.core }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        if: steps.should_run.outputs.run == 'true'

      - name: Generate Prisma client (@codemation/host)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        if: steps.should_run.outputs.run == 'true'
        run: pnpm exec turbo run build

      - name: Coverage (e2e)
        if: steps.should_run.outputs.run == 'true'
        run: pnpm run coverage:e2e

      - name: Upload lcov (e2e)
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-e2e
          path: coverage/raw/e2e/lcov.info
          if-no-files-found: error

  coverage-report:
    name: Merge coverage & Codecov
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - coverage-unit
      - coverage-integration
      - coverage-integration-sqlite
      - coverage-ui
      - coverage-browser
      - coverage-e2e
    # Run when at least coverage-unit succeeded (always runs), none of the others failed,
    # and the branch is not a version-bump PR.
    # `!cancelled()` is required so this job still evaluates its `if` (and runs)
    # when a dependency like coverage-browser FAILS — otherwise GitHub auto-skips
    # any job whose `needs` failed, regardless of the result-checks below.
    if: >-
      ${{
        !cancelled() &&
        (github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/'))) &&
        needs.coverage-unit.result == 'success' &&
        (needs.coverage-integration.result == 'success' || needs.coverage-integration.result == 'skipped') &&
        (needs.coverage-integration-sqlite.result == 'success' || needs.coverage-integration-sqlite.result == 'skipped') &&
        (needs.coverage-ui.result == 'success' || needs.coverage-ui.result == 'skipped') &&
        (needs.coverage-browser.result == 'success' || needs.coverage-browser.result == 'skipped' || needs.coverage-browser.result == 'failure' || needs.coverage-browser.result == 'cancelled') &&
        (needs.coverage-e2e.result == 'success' || needs.coverage-e2e.result == 'skipped')
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Download all lcov artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lcov-*
          path: coverage-artifacts

      - name: Normalize lcov paths for merge
        run: |
          set -euo pipefail
          mkdir -p coverage/raw/unit coverage/raw/integration coverage/raw/integration-sqlite coverage/raw/ui coverage/raw/browser coverage/raw/e2e

          copy_if_exists() {
            local artifact="$1"
            local dest="$2"
            local src
            src=$(find "coverage-artifacts/$artifact" -name lcov.info -print -quit 2>/dev/null || true)
            if [ -n "${src:-}" ] && [ -f "$src" ]; then
              cp -f "$src" "$dest"
            else
              echo "No lcov.info found under coverage-artifacts/$artifact — skipping (suite may have been filtered out)."
            fi
          }

          copy_if_exists lcov-unit coverage/raw/unit/lcov.info
          copy_if_exists lcov-integration coverage/raw/integration/lcov.info
          copy_if_exists lcov-integration-sqlite coverage/raw/integration-sqlite/lcov.info
          copy_if_exists lcov-ui coverage/raw/ui/lcov.info
          copy_if_exists lcov-browser coverage/raw/browser/lcov.info
          copy_if_exists lcov-e2e coverage/raw/e2e/lcov.info

          # lcov-unit is always required
          if [ ! -f coverage/raw/unit/lcov.info ]; then
            echo "Missing required coverage/raw/unit/lcov.info" >&2
            exit 1
          fi

      - name: Merge coverage
        run: pnpm run coverage:merge

      # Slice the merged lcov into per-package files so each flag upload only
      # carries data for its own paths. An empty slice (flag's packages weren't
      # exercised this run) is skipped — codecov then applies carryforward from
      # the prior commit rather than recording a fake zero.
      - name: Slice lcov per flag
        run: |
          set -euo pipefail

          # Extract all SF: lines that start with a given path prefix into a
          # standalone lcov file. Outputs nothing if no matching sources exist.
          slice_lcov() {
            local prefix="$1"
            local output="$2"
            # Include the record block (from SF: to end_of_record) when the SF: line
            # starts with the given prefix.
            awk -v prefix="$prefix" '
              /^SF:/ { in_block = (substr($0, 4, length(prefix)) == prefix) }
              in_block { print }
            ' coverage/lcov.info > "$output"
          }

          # core — packages/core only (host/next-host have their own flags)
          slice_lcov "packages/core/" coverage/lcov-core.info

          # core-nodes — all plugin/cli/scaffolder packages that share the flag
          {
            for pkg in packages/core-nodes packages/core-nodes-gmail packages/core-nodes-msgraph \
                       packages/agent-skills packages/cli packages/create-codemation packages/eventbus-redis; do
              awk -v prefix="$pkg/" '
                /^SF:/ { in_block = (substr($0, 4, length(prefix)) == prefix) }
                in_block { print }
              ' coverage/lcov.info
            done
          } > coverage/lcov-core-nodes.info

          slice_lcov "packages/host/"      coverage/lcov-host.info
          slice_lcov "packages/next-host/" coverage/lcov-next-host.info

          # Remove empty slices — hashFiles() on non-existent files returns ''
          # which the upload steps use to skip. Empty-but-present files would
          # give a non-empty hash and trigger an upload of zero data.
          for f in coverage/lcov-core.info coverage/lcov-core-nodes.info \
                   coverage/lcov-host.info coverage/lcov-next-host.info; do
            if [ ! -s "$f" ]; then
              echo "Empty slice $f — removing so upload step is skipped (carryforward will apply)."
              rm -f "$f"
            else
              echo "Slice $f: $(wc -l < "$f") lines"
            fi
          done

      # Optional: add CODECOV_TOKEN secret if uploads fail (public repos often work without it).
      # Four separate uploads — one per flag — so codecov can apply carryforward
      # independently for each package when a PR's path-filter skips its suite.
      - name: Upload coverage — core
        if: ${{ hashFiles('coverage/lcov-core.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov-core.info
          flags: core
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage — core-nodes
        if: ${{ hashFiles('coverage/lcov-core-nodes.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov-core-nodes.info
          flags: core-nodes
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage — host
        if: ${{ hashFiles('coverage/lcov-host.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov-host.info
          flags: host
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage — next-host
        if: ${{ hashFiles('coverage/lcov-next-host.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov-next-host.info
          flags: next-host
          fail_ci_if_error: true
          verbose: true

  # Fail when workspace packages change without a matching .changeset entry (pull requests only).
  # No prisma:generate — changeset status only reads package manifests + git; it does not load generated code.
  # A no-op step on push keeps this check name green for rulesets that require it on every workflow run.
  changeset-verify:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Verify changeset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # changeset status compares to baseBranch (main); PR checkouts often lack a local refs/heads/main.
      - name: Fetch base branch for changesets
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Install pnpm
        if: github.event_name == 'pull_request'
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: pnpm install --frozen-lockfile

      - name: Verify PR changeset coverage
        if: github.event_name == 'pull_request'
        env:
          CHANGESET_VERIFY_MODE: ci
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: sh tooling/scripts/verify-changeset-coverage.sh

      - name: Pass when not a pull request
        if: github.event_name != 'pull_request'
        run: echo "Changeset verification applies to pull requests only."

  # Single status check for branch protection: require only this job on `main` PRs.
  # Version-bump PR heads (`release/*`, `changeset-release/*`) skip upstream jobs; those jobs report
  # `skipped` (success for GitHub). For feature PRs, jobs that were filtered out (skipped by path-filter)
  # also count as success — the path-filter ensures correctness by running on force_full.
  merge-gate:
    name: Merge requirements
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static
      - template-release-smoke
      - workspace-host-docker-build
      - path-filter
      - coverage-unit
      - coverage-integration
      - coverage-integration-sqlite
      - coverage-ui
      - coverage-browser
      - coverage-e2e
      - coverage-report
      - changeset-verify
    steps:
      - name: Enforce merge requirements
        env:
          IS_VERSION_PR: ${{ startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'changeset-release/') }}
          R_STATIC: ${{ needs.static.result }}
          R_TEMPLATE: ${{ needs.template-release-smoke.result }}
          R_DOCKER: ${{ needs.workspace-host-docker-build.result }}
          R_PATH_FILTER: ${{ needs.path-filter.result }}
          R_COV_UNIT: ${{ needs.coverage-unit.result }}
          R_COV_INT: ${{ needs.coverage-integration.result }}
          R_COV_SQLITE: ${{ needs.coverage-integration-sqlite.result }}
          R_COV_UI: ${{ needs.coverage-ui.result }}
          R_COV_BROWSER: ${{ needs.coverage-browser.result }}
          R_COV_E2E: ${{ needs.coverage-e2e.result }}
          R_COV_REPORT: ${{ needs.coverage-report.result }}
          R_CHANGESET: ${{ needs.changeset-verify.result }}
        shell: bash
        run: |
          set -euo pipefail

          # Jobs that must be success (never skipped) — they always run on feature PRs.
          required_success=(
            "${R_STATIC}"
            "${R_TEMPLATE}"
            "${R_DOCKER}"
            "${R_PATH_FILTER}"
            "${R_COV_UNIT}"
            "${R_COV_REPORT}"
            "${R_CHANGESET}"
          )
          # Jobs that may be skipped by path-filter (but must not fail).
          filterable=(
            "${R_COV_INT}"
            "${R_COV_SQLITE}"
            "${R_COV_UI}"
            "${R_COV_BROWSER}"
            "${R_COV_E2E}"
          )

          if [[ "${IS_VERSION_PR}" == "true" ]]; then
            all_results=(
              "${required_success[@]}"
              "${filterable[@]}"
            )
            for r in "${all_results[@]}"; do
              if [[ "${r}" != "success" && "${r}" != "skipped" ]]; then
                echo "Merge gate: unexpected job result on version-packages PR head: ${r}"
                exit 1
              fi
            done
            echo "Version packages PR: upstream jobs skipped by policy; merge requirements satisfied."
            exit 0
          fi

          for r in "${required_success[@]}"; do
            if [[ "${r}" != "success" ]]; then
              echo "Merge gate: required CI job did not succeed (${r})."
              exit 1
            fi
          done

          for r in "${filterable[@]}"; do
            if [[ "${r}" != "success" && "${r}" != "skipped" ]]; then
              echo "Merge gate: filterable CI job neither succeeded nor was skipped (${r})."
              exit 1
            fi
          done

          echo "All required CI jobs succeeded (filterable jobs: success or skipped)."
