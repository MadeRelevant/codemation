name: Publish npm

# Triggered by: (1) push of a version tag v*, (2) workflow_dispatch, (3) `gh workflow run` from changesets-version.yml
# after tagging. We use dispatch instead of `workflow_call` so this file is the top-level workflow for the run —
# npm trusted publishing (OIDC) validates this workflow name, not the Changesets workflow (see npm docs).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.0.19"
        required: true
        type: string

concurrency:
  group: publish-npm-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC
  contents: write # Create or update the GitHub Release for the tag

jobs:
  # Template packaged smoke runs on main via CI; release only publishes.
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Resolve release tag
        id: release-tag
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "${REQUESTED_TAG}" ]; then
            echo "tag=${REQUESTED_TAG}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Trusted publishing (OIDC): list workflow file **publish-npm.yml** on npm (Package → Trusted publishing).
      # Do not invoke this workflow via `workflow_call` from another YAML — npm OIDC would validate the *caller*
      # instead (https://docs.npmjs.org/trusted-publishers ). The Changesets workflow dispatches this run with
      # `gh workflow run` so the executing workflow stays publish-npm.yml.
      # - package.json "repository.url" must match provenance: https://github.com/MadeRelevant/codemation
      # - 404 / ENEEDAUTH often mean OIDC trust mismatch, not a bad tarball.
      # - Requires npm CLI ≥ 11.5.1 (Node 24 images satisfy this).
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
        run: pnpm publish -r --access public --no-git-checks --provenance --filter "./packages/*"

      - name: Build aggregated GitHub Release notes
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          node tooling/release/build-github-release-notes.mjs \
            --root . \
            --version "${RELEASE_TAG#v}" \
            --tag "${RELEASE_TAG}" \
            --repository "${GITHUB_REPOSITORY}" \
            --output "${RUNNER_TEMP}/release-notes.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
