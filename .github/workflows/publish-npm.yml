name: Publish npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  template-release-smoke:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template packaged smoke
            command: test:packaged-smoke
          - name: Template interactive Verdaccio smoke
            command: test:interactive-verdaccio-smoke
    container:
      image: node:24-bookworm

    steps:
      - name: Install container prerequisites
        # `script` (util-linux) is required by the interactive smoke test; keep Python/build tools as
        # native-module fallback for dependency installs inside the bare Node container.
        run: apt-get update && apt-get install -y git util-linux python3 make g++

      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Run ${{ matrix.name }}
        run: pnpm --filter create-codemation run ${{ matrix.command }}

  publish:
    needs: template-release-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Publishes every workspace package under packages/ with "private": false.
      # Add repository, files, and publishConfig in each package you publish; set NPM_TOKEN in repo secrets.
      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks --filter "./packages/*"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
