name: Changesets

# Opens or updates the "Version Packages" PR when changesets land on main. Publishing stays on tag (publish-npm.yml).
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Used by @changesets/changelog-github (get-github-info) when resolving PRs/commits.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Version Packages PR
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          # `changesets/action@v1` treats `branch` as the PR base and creates `changeset-release/<branch>` automatically.
          branch: main
