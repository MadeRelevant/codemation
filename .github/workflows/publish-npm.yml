name: Publish npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  # Template smokes (packaged + interactive Verdaccio) run on main via CI; release only publishes.
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Trusted publishing (OIDC): each published package needs:
      # - GitHub Actions trusted publisher on npmjs.com (Package → Settings → Trusted publishing): repo
      #   MadeRelevant/codemation, workflow file publish-npm.yml (name must match exactly).
      # - package.json "repository.url" matching this repo (see packages/*/package.json).
      # 404 / ENEEDAUTH from the registry often means OIDC trust mismatch, not a missing tarball.
      # Requires npm CLI ≥ 11.5.1 (Node 24 images satisfy this).
      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks --filter "./packages/*"
