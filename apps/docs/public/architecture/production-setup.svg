  <path d="M1215 370V470" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <text x="90" y="882" fill="#94A3B8" font-family="Arial, sans-serif" font-size="22">Use this setup when you need shared persistence, queue-backed execution, or dedicated workers.</text>
