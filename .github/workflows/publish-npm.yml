name: Publish npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Publishes every workspace package under packages/ with "private": false.
      # Add repository, files, and publishConfig in each package you publish; set NPM_TOKEN in repo secrets.
      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks --filter "./packages/*"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
