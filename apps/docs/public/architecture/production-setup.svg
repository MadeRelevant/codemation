  <rect x="1232" y="274" width="210" height="70" rx="18" fill="#111827" stroke="#EF4444" stroke-width="2"/>
  <text x="1048" y="318" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">PostgreSQL</text>
  <text x="1300" y="318" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">Redis</text>

  <rect x="960" y="500" width="520" height="190" rx="28" fill="#0B1220" stroke="#475569" stroke-width="2"/>
  <text x="998" y="558" fill="white" font-family="Arial, sans-serif" font-size="34" font-weight="700">Codemation runtime services</text>
  <rect x="998" y="594" width="210" height="70" rx="18" fill="#111827" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="1232" y="594" width="210" height="70" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
