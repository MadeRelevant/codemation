name: Publish npm

# After the Version Packages PR merges, tag a release (e.g. v0.0.18) to publish. Changesets open that PR via changesets-version.yml.
on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC
  contents: write # Create or update the GitHub Release for the tag

jobs:
  # Template smokes (packaged + interactive Verdaccio) run on main via CI; release only publishes.
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Trusted publishing (OIDC): each published package needs:
      # - GitHub Actions trusted publisher on npmjs.com (Package → Settings → Trusted publishing): repo
      #   MadeRelevant/codemation, workflow file publish-npm.yml (name must match exactly).
      # - package.json "repository.url" must match provenance (canonical):
      #   https://github.com/MadeRelevant/codemation (not git+https / .git variants).
      # 404 / ENEEDAUTH from the registry often means OIDC trust mismatch, not a missing tarball.
      # Requires npm CLI ≥ 11.5.1 (Node 24 images satisfy this).
      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks --filter "./packages/*"

      - name: Build aggregated GitHub Release notes
        run: |
          node tooling/release/build-github-release-notes.mjs \
            --root . \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "${GITHUB_REF_NAME}" \
            --repository "${GITHUB_REPOSITORY}" \
            --output "${RUNNER_TEMP}/release-notes.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
