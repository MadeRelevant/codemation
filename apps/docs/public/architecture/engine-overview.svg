  <text x="884" y="350" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">run continuation</text>
  <text x="575" y="492" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">Policies</text>
