name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

# One run per PR (by number) or per ref; new pushes cancel superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Skip full CI on Changesets "Version packages" PRs (release/*, legacy changeset-release/*).
  # Merge those with maintainer bypass; see CONTRIBUTING.md.
  static:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # prisma.config.ts requires DATABASE_URL; `prisma generate` does not need a live server.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: "format:check"
          - name: Lint ESLint
            command: "lint:eslint"
          - name: Lint repo
            command: "lint:repo"
          - name: Typecheck
            command: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        if: ${{ matrix.name != 'Format' }}
        run: pnpm --filter @codemation/host prisma:generate

      - name: Run ${{ matrix.name }}
        run: pnpm ${{ matrix.command }}

  template-release-smoke:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # prisma.config.ts requires DATABASE_URL; `prisma generate` does not need a live server.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template packaged smoke
            command: test:packaged-smoke
          - name: Template interactive Verdaccio smoke
            command: test:interactive-verdaccio-smoke
    container:
      image: node:24-bookworm

    steps:
      - name: Install container prerequisites
        # `script` (util-linux) is required by the interactive smoke test; keep Python/build tools as
        # native-module fallback for dependency installs inside the bare Node container.
        run: apt-get update && apt-get install -y git util-linux python3 make g++

      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Run ${{ matrix.name }}
        run: pnpm --filter create-codemation run ${{ matrix.command }}

  # --- Coverage: one job per suite (parallel runners); merge + Codecov in coverage-report ---
  coverage-unit:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — unit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      - name: Coverage (unit)
        run: pnpm run coverage:unit

      - name: Upload lcov (unit)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-unit
          path: coverage/raw/unit/lcov.info
          if-no-files-found: error

  coverage-integration:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      - name: Coverage (integration)
        run: pnpm run coverage:integration

      - name: Upload lcov (integration)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-integration
          path: coverage/raw/integration/lcov.info
          if-no-files-found: error

  coverage-ui:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — UI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      - name: Coverage (UI)
        run: pnpm run coverage:ui

      - name: Upload lcov (ui)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-ui
          path: coverage/raw/ui/lcov.info
          if-no-files-found: error

  coverage-browser:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — browser
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Install Playwright (Chromium)
        run: pnpm --filter @codemation/host exec playwright install chromium --with-deps

      - name: Build
        run: pnpm exec turbo run build

      - name: Coverage (browser)
        run: pnpm run coverage:browser

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-artifacts
          path: |
            packages/host/test-results
            packages/host/test/playwright/.e2e-prepared.json
            coverage/raw/browser/monocart-report.html
            coverage/raw/browser/monocart-report.json
            coverage/raw/browser-scaffolded/monocart-report.html
            coverage/raw/browser-scaffolded/monocart-report.json
          if-no-files-found: warn

      - name: Upload lcov (browser)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-browser
          path: coverage/raw/browser/lcov.info
          if-no-files-found: error

  coverage-e2e:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Coverage — e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      - name: Coverage (e2e)
        run: pnpm run coverage:e2e

      - name: Upload lcov (e2e)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-e2e
          path: coverage/raw/e2e/lcov.info
          if-no-files-found: error

  coverage-report:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Merge coverage & Codecov
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - coverage-unit
      - coverage-integration
      - coverage-ui
      - coverage-browser
      - coverage-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all lcov artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lcov-*
          path: coverage-artifacts

      - name: Normalize lcov paths for merge
        run: |
          set -euo pipefail
          mkdir -p coverage/raw/unit coverage/raw/integration coverage/raw/ui coverage/raw/browser coverage/raw/e2e
          copy_one() {
            local artifact="$1"
            local dest="$2"
            local src
            src=$(find "coverage-artifacts/$artifact" -name lcov.info -print -quit)
            if [ -z "${src:-}" ] || [ ! -f "$src" ]; then
              echo "Missing lcov.info under coverage-artifacts/$artifact" >&2
              exit 1
            fi
            cp -f "$src" "$dest"
          }
          copy_one lcov-unit coverage/raw/unit/lcov.info
          copy_one lcov-integration coverage/raw/integration/lcov.info
          copy_one lcov-ui coverage/raw/ui/lcov.info
          copy_one lcov-browser coverage/raw/browser/lcov.info
          copy_one lcov-e2e coverage/raw/e2e/lcov.info

      - name: Merge coverage
        run: pnpm run coverage:merge

      # Optional: add CODECOV_TOKEN secret if uploads fail (public repos often work without it).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

  # Fail when workspace packages change without a matching .changeset entry (pull requests only).
  # No prisma:generate — changeset status only reads package manifests + git; it does not load generated code.
  # A no-op step on push keeps this check name green for rulesets that require it on every workflow run.
  changeset-verify:
    if: ${{ github.event_name != 'pull_request' || (github.head_ref != '' && !startsWith(github.head_ref, 'release/') && !startsWith(github.head_ref, 'changeset-release/')) }}
    name: Verify changeset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # changeset status compares to baseBranch (main); PR checkouts often lack a local refs/heads/main.
      - name: Fetch base branch for changesets
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Install pnpm
        if: github.event_name == 'pull_request'
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: pnpm install --frozen-lockfile

      - name: Changeset status (requires changesets when packages change)
        if: github.event_name == 'pull_request'
        run: pnpm exec changeset status

      - name: Pass when not a pull request
        if: github.event_name != 'pull_request'
        run: echo "Changeset verification applies to pull requests only."
