name: Publish npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  # Template smokes (packaged + interactive Verdaccio) run on main via CI; release only publishes.
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (@codemation/host)
        run: pnpm --filter @codemation/host prisma:generate

      - name: Build
        run: pnpm exec turbo run build

      # Publishes every workspace package under packages/ with "private": false.
      # Trusted publishing (OIDC): enable the GitHub Actions publisher for this repo in npm; no NPM_TOKEN secret.
      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks --filter "./packages/*"
